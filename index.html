    padding: 12px;

    border-radius: 12px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .card-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    padding: 2px;
    background: var(--rarity-gradient);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;

    inset: 0;

      transparent 20%,
      rgba(255,215,100,0.08) 35%,
      rgba(255,215,100,0.18) 42%,
      rgba(255,255,255,0.12) 50%,
      rgba(255,215,100,0.18) 58%,
      rgba(255,215,100,0.08) 65%,
      transparent 80%

    pointer-events: none;
    border-radius: 12px;
  }
  @keyframes goldenSweep {
    0% { transform: translateX(-120%); }
    50% { transform: translateX(120%); }
    100% { transform: translateX(120%); }
  }
  .card.is-shiny .card-inner::before {
    background: var(--rarity-gradient);
    animation: borderGlow 2s ease-in-out infinite alternate;
  }
  @keyframes borderGlow {
    0% { opacity: 0.6; }
    100% { opacity: 1; }

// ============================================================
// Mulberry32 PRNG
// ============================================================
function mulberry32(seed) {
  let a = seed >>> 0;
  return function() {
    a |= 0;
    a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function hashString(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function pick(rng, arr) {
  return arr[Math.floor(rng() * arr.length)];
}

function rollRarity(rng) {
  const total = Object.values(RARITY_WEIGHTS).reduce((a,b) => a+b, 0);
  let roll = rng() * total;
  for (const r of RARITIES) {
    roll -= RARITY_WEIGHTS[r];
    if (roll < 0) return r;
  }
  return "common";
}

function rollStats(rng, rarity) {
  const floor = RARITY_FLOOR[rarity];
  const peak = pick(rng, STAT_NAMES);
  let dump = pick(rng, STAT_NAMES);
  while (dump === peak) dump = pick(rng, STAT_NAMES);
  
  const stats = {};
  for (const name of STAT_NAMES) {
    if (name === peak) {
      stats[name] = Math.min(100, floor + 50 + Math.floor(rng() * 30));
    } else if (name === dump) {
      stats[name] = Math.max(1, floor - 10 + Math.floor(rng() * 15));
    } else {
      stats[name] = floor + Math.floor(rng() * 40);
    }
  }
  return { stats, peak, dump };
}

const SALT = "friend-2026-401"; // Algorithm salt

function rollFromSeed(seedStr) {
  const h = hashString(seedStr + SALT);
  const rng = mulberry32(h);
  const rarity = rollRarity(rng);
  const species = pick(rng, SPECIES);
  const eye = pick(rng, EYES);
  const hat = rarity === "common" ? "none" : pick(rng, HATS);
  const shiny = rng() < 0.01;
  const { stats, peak, dump } = rollStats(rng, rarity);
  return { rarity, species, eye, hat, shiny, stats, peak, dump };
}

  });

    name: document.getElementById("name").value,
    personality: document.getElementById("personality").value,
    shiny: document.getElementById("shiny").checked,

}

function setFormData(data) {
  document.getElementById("species").value = data.species;
  document.getElementById("eye").value = data.eye;
  document.getElementById("hat").value = data.hat;
  document.getElementById("rarity").value = data.rarity;
  document.getElementById("shiny").checked = data.shiny;
  if (!document.getElementById("name").value) {
    document.getElementById("name").value = DEFAULT_NAMES[data.species] || "";
  }
  if (!document.getElementById("personality").value) {
    document.getElementById("personality").value = DEFAULT_PERSONALITIES[data.species] || "";
  }
}

function renderCard(data) {
  const { species, eye, hat, rarity, shiny, stats, peak, dump } = data;
  const name = document.getElementById("name").value || DEFAULT_NAMES[species] || "Unnamed";
  const personality = document.getElementById("personality").value || DEFAULT_PERSONALITIES[species] || "";
  const rc = RARITY_COLORS[rarity];
  
  // Card class
  const card = document.getElementById("card");
  card.className = `card rarity-${rarity}${shiny ? ' is-shiny' : ''}`;
  
  // Border gradient
  const inner = document.getElementById("cardInner");
  inner.style.setProperty("--rarity-gradient", rc.gradient);
  inner.classList.remove("pop");
  void inner.offsetWidth; // reflow
  inner.classList.add("pop");
  
  // Rarity badge
  const badge = document.getElementById("rarityBadge");
  badge.textContent = `${RARITY_STARS[rarity]} ${rarity.toUpperCase()}`;
  badge.style.color = rc.color;
  
  // Species
  document.getElementById("speciesBadge").textContent = species.toUpperCase();
  
  // Shiny
  const shinyEl = document.getElementById("shinyBadge");
  shinyEl.style.display = shiny ? "block" : "none";
  shinyEl.style.color = "#fab387";
  
  // ASCII art
  let artLines = BODIES[species].map(l => l.replaceAll("{E}", eye));
  if (hat !== "none" && HAT_LINES[hat]) {
    artLines = [HAT_LINES[hat], ...artLines];
  }
  document.getElementById("asciiArt").textContent = artLines.join("\n");
  
  // Name & personality
  document.getElementById("petName").textContent = name;
  document.getElementById("petName").style.color = rarity === "legendary" ? "#f9e2af" : "#fff";
  document.getElementById("petPersonality").textContent = personality ? `"${personality}"` : "";
  
  // Stats
  const statsEl = document.getElementById("statsContainer");
  statsEl.innerHTML = "";
  for (const [stat, value] of Object.entries(stats)) {
    const isPeak = stat === peak;
    const isDump = stat === dump;
    const barColor = isPeak ? rc.color : "#89b4fa";
    const labelColor = isPeak ? rc.color : isDump ? "#585b70" : "#a6adc8";
    const valueColor = isPeak ? rc.color : "#cdd6f4";
    
    statsEl.innerHTML += `
      <div class="stat-row">
        <span class="stat-label" style="color:${labelColor}">${stat}</span>
        <div class="stat-bar-bg">
          <div class="stat-bar-fill" style="width:${value}%;background:${barColor}"></div>
        </div>
        <span class="stat-value" style="color:${valueColor}">${value}</span>
      </div>
    `;
  }
  
  // Footer
  document.getElementById("cardFooter").textContent = 
    `eye:${EYES_MAP[eye]||eye} · hat:${hat}${shiny?" · SHINY":""} · ${RARITY_WEIGHTS[rarity]}% chance`;
}

let currentData = null;

function generateCard() {
  const form = getFormData();
  const rng = mulberry32(Math.random() * 0xFFFFFFFF >>> 0);
  const { stats, peak, dump } = rollStats(rng, form.rarity);
  currentData = { ...form, stats, peak, dump };
  renderCard(currentData);
}

function randomRoll() {
  const rng = mulberry32(Math.random() * 0xFFFFFFFF >>> 0);
  const rarity = rollRarity(rng);
  const species = pick(rng, SPECIES);
  const eye = pick(rng, EYES);
  const hat = rarity === "common" ? "none" : pick(rng, HATS);
  const shiny = rng() < 0.01;
  const { stats, peak, dump } = rollStats(rng, rarity);
  
  currentData = { rarity, species, eye, hat, shiny, stats, peak, dump };
  
  document.getElementById("name").value = DEFAULT_NAMES[species] || "";
  document.getElementById("personality").value = DEFAULT_PERSONALITIES[species] || "";
  setFormData(currentData);
  renderCard(currentData);
}

function seedRoll() {
  const seed = document.getElementById("seed").value.trim();
  if (!seed) { alert("Please enter a seed (userId)"); return; }
  
  currentData = rollFromSeed(seed);
  
  document.getElementById("name").value = DEFAULT_NAMES[currentData.species] || "";
  document.getElementById("personality").value = DEFAULT_PERSONALITIES[currentData.species] || "";
  setFormData(currentData);
  renderCard(currentData);
}

function downloadCard() {
  if (!currentData) { alert("Generate a card first!"); return; }
  const d = currentData;
  const petName = document.getElementById("name").value || DEFAULT_NAMES[d.species] || "Unnamed";
  const personality = document.getElementById("personality").value || DEFAULT_PERSONALITIES[d.species] || "";
  const rc = RARITY_COLORS[d.rarity];

  // Match the web card dimensions (400px card width)
  const W = 420, M = 16, S = 2;
  // Pre-calculate height dynamically
  let preH = M + 38; // top padding + rarity line
  if (d.shiny) preH += 22;
  const artCount = BODIES[d.species].length + (d.hat !== 'none' ? 1 : 0);
  preH += 8 + artCount * 26 + 12; // art
  preH += 28; // name
  if (personality) {
    const estLines = Math.ceil((`"${personality}"`).length / 38);
    preH += estLines * 18 + 8;
  }
  preH += 5 * 28 + 14; // stats
  preH += 30; // footer + bottom padding
  const H = preH;

  const canvas = document.createElement("canvas");
  canvas.width = W * S; canvas.height = H * S;
  const ctx = canvas.getContext("2d");
  ctx.scale(S, S);

  // Background
  ctx.fillStyle = "#1e1e2e";
  ctx.fillRect(0, 0, W, H);

  // Card bg with rounded rect
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  // Helper to parse hex color to rgba
  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // Glow for rare+
  if (["rare","epic","legendary"].includes(d.rarity)) {
    const alphas = [0.12, 0.18, 0.25, 0.35];
    for (let i = 4; i > 0; i--) {
      ctx.strokeStyle = hexToRgba(rc.color, alphas[4-i]);
      ctx.lineWidth = 2;
      roundRect(M-i*2, M-i*2, W-2*M+i*4, H-2*M+i*4, 16);
      ctx.stroke();
    }
  }

  // Card fill
  const bgMap = {
    legendary: "#302820", epic: "#2a2035", rare: "#202a38",
    uncommon: "#203020", common: "#24243a"
  };
  roundRect(M, M, W-2*M, H-2*M, 14);
  ctx.fillStyle = bgMap[d.rarity];
  ctx.fill();
  ctx.strokeStyle = rc.color;
  ctx.lineWidth = d.rarity === "legendary" || d.rarity === "epic" ? 3 : d.rarity === "rare" ? 2 : 1;
  ctx.stroke();

  let y = M + 34;

  // Rarity badge
  ctx.font = "bold 13px 'JetBrains Mono', monospace";
  ctx.fillStyle = rc.color;
  ctx.textBaseline = "middle";
  ctx.fillText(`${RARITY_STARS[d.rarity]} ${d.rarity.toUpperCase()}`, M + 20, y);

  // Species (right)
  ctx.font = "bold 12px 'Inter', sans-serif";
  ctx.fillStyle = "#b4befe";
  const spText = d.species.toUpperCase();
  const spW = ctx.measureText(spText).width;
  ctx.fillText(spText, W - M - 20 - spW, y);
  y += 24;

  // Shiny
  if (d.shiny) {
    ctx.font = "bold 12px 'JetBrains Mono', monospace";
    ctx.fillStyle = "#c89e50";
    const shinyText = "~ SHINY ~";
    const shW = ctx.measureText(shinyText).width;
    ctx.fillText(shinyText, (W - shW) / 2, y);
    y += 22;
  }

  // ASCII art
  ctx.font = "17px 'JetBrains Mono', Menlo, monospace";
  ctx.fillStyle = "#cdd6f4";
  let artLines = BODIES[d.species].map(l => l.replaceAll("{E}", d.eye));
  if (d.hat !== "none" && HAT_LINES[d.hat]) {
    artLines = [HAT_LINES[d.hat], ...artLines];
  }
  y += 8;
  for (const line of artLines) {
    const lw = ctx.measureText(line).width;
    ctx.fillText(line, (W - lw) / 2, y);
    y += 26;
  }
  y += 12;

  // Name
  ctx.font = "bold 22px 'Inter', sans-serif";
  ctx.fillStyle = d.rarity === "legendary" ? "#f9e2af" : "#ffffff";
  ctx.fillText(petName, M + 24, y);
  y += 28;

  // Personality (word wrap)
  if (personality) {
    ctx.font = "italic 11px 'Inter', sans-serif";
    ctx.fillStyle = "#9399b2";
    const quote = `"${personality}"`;
    const words = quote.split(" ");
    let line = "";
    const maxW = W - 2 * M - 48;
    for (const w of words) {
      const test = line ? line + " " + w : w;
      if (ctx.measureText(test).width > maxW && line) {
        ctx.fillText(line, M + 24, y);
        y += 18;
        line = w;
      } else {
        line = test;
      }
    }
    if (line) { ctx.fillText(line, M + 24, y); y += 18; }
  }
  y += 14;

  // Stats
  const BAR_X = M + 100, BAR_W = 190, BAR_H = 14;
  ctx.textBaseline = "middle";
  for (const [stat, value] of Object.entries(d.stats)) {
    const isPeak = stat === d.peak;
    const isDump = stat === d.dump;

    // Label
    ctx.font = "11px 'JetBrains Mono', monospace";
    ctx.fillStyle = isPeak ? rc.color : isDump ? "#585b70" : "#a6adc8";
    ctx.textAlign = "right";
    ctx.fillText(stat, BAR_X - 10, y + BAR_H / 2);
    ctx.textAlign = "left";

    // Bar bg
    roundRect(BAR_X, y, BAR_W, BAR_H, 3);
    ctx.fillStyle = "#2a2a3c";
    ctx.fill();

    // Bar fill
    const fw = Math.round(BAR_W * value / 100);
    if (fw > 0) {
      roundRect(BAR_X, y, fw, BAR_H, 3);
      ctx.fillStyle = isPeak ? rc.color : "#7aa2ec";
      ctx.fill();
    }

    // Value
    ctx.font = "11px 'JetBrains Mono', monospace";
    ctx.fillStyle = isPeak ? rc.color : "#cdd6f4";
    ctx.fillText(String(value), BAR_X + BAR_W + 10, y + BAR_H / 2);
    y += 28;
  }

  // Footer
  y += 8;
  ctx.font = "10px 'JetBrains Mono', monospace";
  ctx.fillStyle = "#6c7086";
  ctx.textAlign = "center";
  ctx.fillText(`eye:${EYES_MAP[d.eye]||d.eye} · hat:${d.hat}${d.shiny?" · SHINY":""} · ${RARITY_WEIGHTS[d.rarity]}% chance`, W/2, y);
  ctx.textAlign = "left";

  // Download
  const link = document.createElement("a");
  link.download = `buddy_${petName.toLowerCase().replace(/\s+/g,"_")}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

// Init
initControls();
// Default: show a legendary axolotl
document.getElementById("species").value = "axolotl";
document.getElementById("eye").value = "@";
document.getElementById("hat").value = "wizard";
document.getElementById("rarity").value = "legendary";
document.getElementById("shiny").checked = true;
document.getElementById("name").value = "Nebula";
document.getElementById("personality").value = "Regenerates lost semicolons and swallows segfaults whole. Never wrong, occasionally chaotic, always sparkly.";
generateCard();
</script>
